<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — UHS-PIMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="uhs-app">
  <div id="uhs-sidebar-mount"></div>

  <div class="uhs-main">
    <div id="uhs-topbar-mount"></div>

    <div class="uhs-content">
      <div class="row g-3">
        <div class="col-lg-6">
          <div class="uhs-card p-4">
            <h6 class="fw-bold mb-3">Account Information</h6>
            <div class="mb-2"><span class="text-muted small">Email</span><div class="fw-semibold" id="profileEmail">—</div></div>
            <div class="mb-2"><span class="text-muted small">Role</span><div class="fw-semibold">DR Office Administrator</div></div>
            <div><span class="text-muted small">Account Created</span><div class="fw-semibold" id="profileCreated">—</div></div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="uhs-card p-4">
            <h6 class="fw-bold mb-3">Change Password</h6>
            <form id="pwdForm">
              <div class="mb-3">
                <label class="form-label small fw-semibold">New Password</label>
                <input type="password" class="form-control" id="newPassword" minlength="6" required>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-semibold">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword" minlength="6" required>
              </div>
              <button type="submit" class="btn btn-uhs-primary">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div id="uhs-footer-mount"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config/supabase.js"></script>
<script src="../config/config.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/data.js"></script>
<script>
(async () => {
  const session = await Auth.requireAuth();
  if (!session) return;
  renderSidebar("profile");
  renderTopbar("Profile");
  renderFooter();

  document.getElementById("profileEmail").textContent = session.user.email;
  document.getElementById("profileCreated").textContent = Utils.formatDate(session.user.created_at);

  document.getElementById("pwdForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const pwd = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    if (pwd !== confirm) {
      Utils.toast("Passwords do not match.", "error");
      return;
    }
    const { error } = await supabaseClient.auth.updateUser({ password: pwd });
    if (error) {
      Utils.toast("Failed to update password: " + error.message, "error");
    } else {
      Utils.toast("Password updated successfully.");
      document.getElementById("pwdForm").reset();
    }
  });
})();
</script>
</body>
</html>
