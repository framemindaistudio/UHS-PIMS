<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("uhs-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<title>Colleges — UHS-PIMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="uhs-app">
  <div id="uhs-sidebar-mount"></div>

  <div class="uhs-main">
    <div id="uhs-topbar-mount"></div>

    <div class="uhs-content">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h5 class="fw-bold mb-0">Colleges</h5>
          <p class="text-muted small mb-0">Manage colleges under UHS</p>
        </div>
        <button class="btn btn-uhs-primary admin-only" data-bs-toggle="modal" data-bs-target="#collegeModal" onclick="openAddModal()">
          <i class="bi bi-plus-lg"></i> Add College
        </button>
      </div>

      <div class="uhs-card p-3">
        <div class="table-responsive">
          <table class="table table-uhs align-middle mb-0">
            <thead><tr><th>Name</th><th>Location</th><th class="text-end admin-only">Actions</th></tr></thead>
            <tbody id="tableBody">
              <tr><td colspan="3" class="text-center text-muted py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="uhs-footer-mount"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="collegeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="collegeForm">
        <div class="modal-header">
          <h6 class="modal-title fw-bold" id="collegeModalTitle">Add College</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">College Name *</label>
            <input type="text" class="form-control" id="collegeName" required>
          </div>
          <div class="mb-1">
            <label class="form-label fw-semibold">Location</label>
            <input type="text" class="form-control" id="collegeLocation">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-uhs-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config/supabase.js"></script>
<script src="../config/config.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../components/onboarding.js"></script>
<script>
let editId = null;

function openAddModal() {
  editId = null;
  document.getElementById("collegeModalTitle").textContent = "Add College";
  document.getElementById("collegeForm").reset();
}

function openEditModal(id, name, location) {
  editId = id;
  document.getElementById("collegeModalTitle").textContent = "Edit College";
  document.getElementById("collegeName").value = name;
  document.getElementById("collegeLocation").value = location || "";
  new bootstrap.Modal(document.getElementById("collegeModal")).show();
}

// One-click delete: remove the row immediately, real delete deferred with Undo.
function deleteWithUndo(id) {
  document.querySelector(`#tableBody tr[data-id="${id}"]`)?.remove();
  Utils.undoToast({
    message: "College deleted.",
    onUndo: () => loadColleges(),
    onCommit: async () => {
      try { await DataService.deleteCollege(id); loadColleges(); }
      catch (err) { Utils.toast("Delete failed: " + err.message, "error"); loadColleges(); }
    }
  });
}

async function loadColleges() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = Utils.skeletonRows(3);
  try {
    const colleges = await DataService.listColleges();
    if (colleges.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3"><div class="uhs-empty-state"><i class="bi bi-bank2"></i>No colleges added yet.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = colleges.map(c => `
      <tr data-id="${c.id}">
        <td class="fw-semibold">${Utils.escapeHtml(c.name)}</td>
        <td>${Utils.escapeHtml(c.location || "—")}</td>
        <td class="text-end admin-only">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEditModal('${c.id}', '${Utils.escapeHtml(c.name).replace(/'/g,"\\'")}', '${Utils.escapeHtml(c.location || "").replace(/'/g,"\\'")}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteWithUndo('${c.id}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>
    `).join("");
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">${Utils.escapeHtml(err.message)}</td></tr>`;
  }
}

document.getElementById("collegeForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    name: document.getElementById("collegeName").value.trim(),
    location: document.getElementById("collegeLocation").value.trim() || null
  };
  try {
    if (editId) {
      await DataService.updateCollege(editId, payload);
      Utils.toast("College updated.");
    } else {
      await DataService.addCollege(payload);
      Utils.toast("College added.");
    }
    bootstrap.Modal.getInstance(document.getElementById("collegeModal")).hide();
    loadColleges();
  } catch (err) {
    Utils.toast("Error: " + err.message, "error");
  }
});

(async () => {
  const session = await Auth.requireAuth();
  if (!session) return;
  renderSidebar("colleges");
  renderTopbar("Colleges");
  renderFooter();
  await loadColleges();
})();
</script>
</body>
</html>
