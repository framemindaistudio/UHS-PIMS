<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("uhs-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<title>Departments — UHS-PIMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="uhs-app">
  <div id="uhs-sidebar-mount"></div>

  <div class="uhs-main">
    <div id="uhs-topbar-mount"></div>

    <div class="uhs-content">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h5 class="fw-bold mb-0">Departments</h5>
          <p class="text-muted small mb-0">Manage university departments</p>
        </div>
        <button class="btn btn-uhs-primary admin-only" data-bs-toggle="modal" data-bs-target="#deptModal" onclick="openAddModal()">
          <i class="bi bi-plus-lg"></i> Add Department
        </button>
      </div>

      <div class="uhs-card p-3">
        <div class="table-responsive">
          <table class="table table-uhs align-middle mb-0">
            <thead><tr><th>Name</th><th>College</th><th class="text-end admin-only">Actions</th></tr></thead>
            <tbody id="tableBody">
              <tr><td colspan="3" class="text-center text-muted py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="uhs-footer-mount"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="deptModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="deptForm">
        <div class="modal-header">
          <h6 class="modal-title fw-bold" id="deptModalTitle">Add Department</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Department Name *</label>
            <input type="text" class="form-control" id="deptName" required>
          </div>
          <div class="mb-1">
            <label class="form-label fw-semibold">College</label>
            <select class="form-select" id="deptCollege"><option value="">Select college</option></select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-uhs-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold">Delete Department</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Delete <strong id="deleteDeptName"></strong>? Projects linked to it will keep their data but lose this department reference.</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config/supabase.js"></script>
<script src="../config/config.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../components/onboarding.js"></script>
<script>
let editId = null;
let deleteId = null;
let collegesCache = [];

function openAddModal() {
  editId = null;
  document.getElementById("deptModalTitle").textContent = "Add Department";
  document.getElementById("deptForm").reset();
}

function openEditModal(id, name, collegeId) {
  editId = id;
  document.getElementById("deptModalTitle").textContent = "Edit Department";
  document.getElementById("deptName").value = name;
  document.getElementById("deptCollege").value = collegeId || "";
  new bootstrap.Modal(document.getElementById("deptModal")).show();
}

function openDeleteModal(id, name) {
  deleteId = id;
  document.getElementById("deleteDeptName").textContent = name;
  new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

async function loadCollegeOptions() {
  collegesCache = await DataService.listColleges();
  const sel = document.getElementById("deptCollege");
  sel.innerHTML = `<option value="">Select college</option>` +
    collegesCache.map(c => `<option value="${c.id}">${Utils.escapeHtml(c.name)}</option>`).join("");
}

async function loadDepartments() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = Utils.skeletonRows(3);
  try {
    const depts = await DataService.listDepartments();
    if (depts.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3"><div class="uhs-empty-state"><i class="bi bi-diagram-3"></i>No departments added yet.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = depts.map(d => `
      <tr>
        <td class="fw-semibold">${Utils.escapeHtml(d.name)}</td>
        <td>${Utils.escapeHtml(d.colleges?.name || "—")}</td>
        <td class="text-end admin-only">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEditModal('${d.id}', '${Utils.escapeHtml(d.name).replace(/'/g,"\\'")}', '${d.college_id || ""}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal('${d.id}', '${Utils.escapeHtml(d.name).replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>
    `).join("");
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">${Utils.escapeHtml(err.message)}</td></tr>`;
  }
}

document.getElementById("deptForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    name: document.getElementById("deptName").value.trim(),
    college_id: document.getElementById("deptCollege").value || null
  };
  try {
    if (editId) {
      await DataService.updateDepartment(editId, payload);
      Utils.toast("Department updated.");
    } else {
      await DataService.addDepartment(payload);
      Utils.toast("Department added.");
    }
    bootstrap.Modal.getInstance(document.getElementById("deptModal")).hide();
    loadDepartments();
  } catch (err) {
    Utils.toast("Error: " + err.message, "error");
  }
});

document.getElementById("confirmDeleteBtn").addEventListener("click", async () => {
  if (!deleteId) return;
  try {
    await DataService.deleteDepartment(deleteId);
    bootstrap.Modal.getInstance(document.getElementById("deleteModal")).hide();
    Utils.toast("Department deleted.");
    loadDepartments();
  } catch (err) {
    Utils.toast("Error: " + err.message, "error");
  }
});

(async () => {
  const session = await Auth.requireAuth();
  if (!session) return;
  renderSidebar("departments");
  renderTopbar("Departments");
  renderFooter();
  await loadCollegeOptions();
  await loadDepartments();
})();
</script>
</body>
</html>
