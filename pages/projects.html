<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — UHS-PIMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="uhs-app">
  <div id="uhs-sidebar-mount"></div>

  <div class="uhs-main">
    <div id="uhs-topbar-mount"></div>

    <div class="uhs-content">

      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h5 class="fw-bold mb-0">Projects</h5>
          <p class="text-muted small mb-0">Manage all research projects</p>
        </div>
        <a href="project-form.html" class="btn btn-uhs-primary admin-only"><i class="bi bi-plus-lg"></i> Add Project</a>
      </div>

      <!-- Search & Filters -->
      <div class="uhs-card p-3 mb-3">
        <div class="row g-2">
          <div class="col-md-4">
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
              <input type="text" id="searchInput" class="form-control" placeholder="Search by title, PI, department...">
            </div>
          </div>
          <div class="col-6 col-md-2">
            <select id="filterStatus" class="form-select">
              <option value="">All Status</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <select id="filterFundingType" class="form-select">
              <option value="">All Funding</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <select id="filterDepartment" class="form-select">
              <option value="">All Departments</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <button class="btn btn-outline-secondary w-100" id="clearFiltersBtn">
              <i class="bi bi-x-circle"></i> Clear
            </button>
          </div>
        </div>
        <div id="filterChips" class="uhs-chips mt-3 d-none"></div>
      </div>

      <!-- Table -->
      <div class="uhs-card p-3">
        <div class="table-responsive">
          <table class="table table-uhs align-middle mb-0">
            <thead>
              <tr>
                <th>Title</th>
                <th>Principal Investigator</th>
                <th>Department</th>
                <th>Funding Type</th>
                <th>Cost</th>
                <th>Status</th>
                <th class="text-end admin-only">Actions</th>
              </tr>
            </thead>
            <tbody id="projectsBody">
              <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="resultCount" class="text-muted small mt-2"></div>
      </div>

    </div>

    <div id="uhs-footer-mount"></div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold">Delete Project</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete <strong id="deleteProjectTitle"></strong>? This action cannot be undone.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config/supabase.js"></script>
<script src="../config/config.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../components/onboarding.js"></script>
<script>
let deleteTargetId = null;
let departmentsCache = [];

async function loadFilterOptions() {
  const statusSel = document.getElementById("filterStatus");
  APP_CONFIG.statusOptions.forEach(s => {
    statusSel.insertAdjacentHTML("beforeend", `<option value="${s}">${s}</option>`);
  });

  const fundingSel = document.getElementById("filterFundingType");
  APP_CONFIG.fundingTypes.forEach(f => {
    fundingSel.insertAdjacentHTML("beforeend", `<option value="${f}">${f}</option>`);
  });

  departmentsCache = await DataService.listDepartments();
  const deptSel = document.getElementById("filterDepartment");
  departmentsCache.forEach(d => {
    deptSel.insertAdjacentHTML("beforeend", `<option value="${d.id}">${Utils.escapeHtml(d.name)}</option>`);
  });
}

function currentFilters() {
  return {
    search: document.getElementById("searchInput").value.trim(),
    status: document.getElementById("filterStatus").value,
    fundingType: document.getElementById("filterFundingType").value,
    departmentId: document.getElementById("filterDepartment").value
  };
}

function renderChips() {
  const container = document.getElementById("filterChips");
  const chips = [];
  const search = document.getElementById("searchInput").value.trim();
  const status = document.getElementById("filterStatus").value;
  const funding = document.getElementById("filterFundingType").value;
  const deptId = document.getElementById("filterDepartment").value;

  if (search) chips.push({ ctrl: "searchInput", label: `Search: "${search}"` });
  if (status) chips.push({ ctrl: "filterStatus", label: status });
  if (funding) chips.push({ ctrl: "filterFundingType", label: funding });
  if (deptId) {
    const d = departmentsCache.find(x => x.id === deptId);
    chips.push({ ctrl: "filterDepartment", label: d ? d.name : "Department" });
  }

  if (chips.length === 0) { container.classList.add("d-none"); container.innerHTML = ""; return; }
  container.classList.remove("d-none");
  container.innerHTML =
    chips.map(c => `<span class="uhs-chip">${Utils.escapeHtml(c.label)}<button data-ctrl="${c.ctrl}" title="Remove"><i class="bi bi-x-lg"></i></button></span>`).join("") +
    `<button class="uhs-chip-clear-all" id="chipClearAll">Clear all</button>`;

  container.querySelectorAll(".uhs-chip button[data-ctrl]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.getElementById(btn.dataset.ctrl).value = "";
      loadProjects();
    });
  });
  document.getElementById("chipClearAll").addEventListener("click", () => {
    document.getElementById("clearFiltersBtn").click();
  });
}

async function loadProjects() {
  const tbody = document.getElementById("projectsBody");
  tbody.innerHTML = Utils.skeletonRows(7);
  renderChips();
  try {
    const filters = currentFilters();
    const projects = await DataService.listProjects(filters);

    document.getElementById("resultCount").textContent = `${projects.length} project(s) found`;

    if (projects.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="uhs-empty-state"><i class="bi bi-flower3"></i>No projects match your search/filters.</div></td></tr>`;
      return;
    }

    tbody.innerHTML = projects.map(p => `
      <tr>
        <td class="fw-semibold">${Utils.escapeHtml(p.title)}</td>
        <td>${Utils.escapeHtml(p.principal_investigator)}</td>
        <td>${Utils.escapeHtml(p.department_name || "—")}</td>
        <td>${Utils.escapeHtml(p.funding_type)}</td>
        <td>${Utils.formatCurrency(p.project_cost)}</td>
        <td>${Utils.statusBadge(p.status)}</td>
        <td class="text-end admin-only">
          <a href="project-form.html?id=${p.id}" class="btn btn-sm btn-outline-secondary me-1" title="Edit"><i class="bi bi-pencil"></i></a>
          <button class="btn btn-sm btn-outline-danger" title="Delete" onclick="openDeleteModal('${p.id}', '${Utils.escapeHtml(p.title).replace(/'/g, "\\'")}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>
    `).join("");
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">Failed to load projects: ${err.message}</td></tr>`;
  }
}

function openDeleteModal(id, title) {
  deleteTargetId = id;
  document.getElementById("deleteProjectTitle").textContent = title;
  new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

document.getElementById("confirmDeleteBtn").addEventListener("click", async () => {
  if (!deleteTargetId) return;
  try {
    await DataService.deleteProject(deleteTargetId);
    bootstrap.Modal.getInstance(document.getElementById("deleteModal")).hide();
    Utils.toast("Project deleted successfully.");
    loadProjects();
  } catch (err) {
    Utils.toast("Failed to delete project: " + err.message, "error");
  }
});

(async () => {
  const session = await Auth.requireAuth();
  if (!session) return;

  renderSidebar("projects");
  renderTopbar("Projects");
  renderFooter();

  await loadFilterOptions();
  await loadProjects();

  document.getElementById("searchInput").addEventListener("input", Utils.debounce(loadProjects, 350));
  document.getElementById("filterStatus").addEventListener("change", loadProjects);
  document.getElementById("filterFundingType").addEventListener("change", loadProjects);
  document.getElementById("filterDepartment").addEventListener("change", loadProjects);
  document.getElementById("clearFiltersBtn").addEventListener("click", () => {
    document.getElementById("searchInput").value = "";
    document.getElementById("filterStatus").value = "";
    document.getElementById("filterFundingType").value = "";
    document.getElementById("filterDepartment").value = "";
    loadProjects();
  });
})();
</script>
</body>
</html>
