<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funding Agencies — UHS-PIMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="uhs-app">
  <div id="uhs-sidebar-mount"></div>

  <div class="uhs-main">
    <div id="uhs-topbar-mount"></div>

    <div class="uhs-content">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h5 class="fw-bold mb-0">Funding Agencies</h5>
          <p class="text-muted small mb-0">Maintain funding agency master data (ICAR, DST, DBT, University, etc.)</p>
        </div>
        <button class="btn btn-uhs-primary" data-bs-toggle="modal" data-bs-target="#agencyModal" onclick="openAddModal()">
          <i class="bi bi-plus-lg"></i> Add Agency
        </button>
      </div>

      <div class="uhs-card p-3">
        <div class="table-responsive">
          <table class="table table-uhs align-middle mb-0">
            <thead><tr><th>Name</th><th>Type</th><th class="text-end">Actions</th></tr></thead>
            <tbody id="tableBody">
              <tr><td colspan="3" class="text-center text-muted py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="uhs-footer-mount"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="agencyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="agencyForm">
        <div class="modal-header">
          <h6 class="modal-title fw-bold" id="agencyModalTitle">Add Funding Agency</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Agency Name *</label>
            <input type="text" class="form-control" id="agencyName" required>
          </div>
          <div class="mb-1">
            <label class="form-label fw-semibold">Type</label>
            <select class="form-select" id="agencyType">
              <option value="">Select type</option>
              <option value="University">University</option>
              <option value="Government">Government</option>
              <option value="Private">Private</option>
              <option value="International">International</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-uhs-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold">Delete Funding Agency</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Delete <strong id="deleteAgencyName"></strong>? Projects linked to it will keep their data but lose this reference.</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config/supabase.js"></script>
<script src="../config/config.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/data.js"></script>
<script>
let editId = null;
let deleteId = null;

function openAddModal() {
  editId = null;
  document.getElementById("agencyModalTitle").textContent = "Add Funding Agency";
  document.getElementById("agencyForm").reset();
}

function openEditModal(id, name, type) {
  editId = id;
  document.getElementById("agencyModalTitle").textContent = "Edit Funding Agency";
  document.getElementById("agencyName").value = name;
  document.getElementById("agencyType").value = type || "";
  new bootstrap.Modal(document.getElementById("agencyModal")).show();
}

function openDeleteModal(id, name) {
  deleteId = id;
  document.getElementById("deleteAgencyName").textContent = name;
  new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

async function loadAgencies() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = Utils.skeletonRows(3);
  try {
    const agencies = await DataService.listFundingAgencies();
    if (agencies.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3"><div class="uhs-empty-state"><i class="bi bi-cash-coin"></i>No funding agencies added yet.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = agencies.map(a => `
      <tr>
        <td class="fw-semibold">${Utils.escapeHtml(a.name)}</td>
        <td>${Utils.escapeHtml(a.agency_type || "—")}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEditModal('${a.id}', '${Utils.escapeHtml(a.name).replace(/'/g,"\\'")}', '${a.agency_type || ""}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal('${a.id}', '${Utils.escapeHtml(a.name).replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>
    `).join("");
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">${err.message}</td></tr>`;
  }
}

document.getElementById("agencyForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    name: document.getElementById("agencyName").value.trim(),
    agency_type: document.getElementById("agencyType").value || null
  };
  try {
    if (editId) {
      await DataService.updateFundingAgency(editId, payload);
      Utils.toast("Funding agency updated.");
    } else {
      await DataService.addFundingAgency(payload);
      Utils.toast("Funding agency added.");
    }
    bootstrap.Modal.getInstance(document.getElementById("agencyModal")).hide();
    loadAgencies();
  } catch (err) {
    Utils.toast("Error: " + err.message, "error");
  }
});

document.getElementById("confirmDeleteBtn").addEventListener("click", async () => {
  if (!deleteId) return;
  try {
    await DataService.deleteFundingAgency(deleteId);
    bootstrap.Modal.getInstance(document.getElementById("deleteModal")).hide();
    Utils.toast("Funding agency deleted.");
    loadAgencies();
  } catch (err) {
    Utils.toast("Error: " + err.message, "error");
  }
});

(async () => {
  const session = await Auth.requireAuth();
  if (!session) return;
  renderSidebar("funding");
  renderTopbar("Funding Agencies");
  renderFooter();
  await loadAgencies();
})();
</script>
</body>
</html>
