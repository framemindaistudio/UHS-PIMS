<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>try{if(localStorage.getItem("uhs-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
<title>Employees — UHS-PIMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="uhs-app">
  <div id="uhs-sidebar-mount"></div>

  <div class="uhs-main">
    <div id="uhs-topbar-mount"></div>

    <div class="uhs-content">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h5 class="fw-bold mb-0">Employees</h5>
          <p class="text-muted small mb-0">Staff register with automatic retirement dates (date of birth + <span id="retAge">62</span> years)</p>
        </div>
        <button class="btn btn-uhs-primary admin-only" onclick="openAddModal()">
          <i class="bi bi-plus-lg"></i> Add Employee
        </button>
      </div>

      <!-- Search + summary -->
      <div class="uhs-card p-3 mb-3">
        <div class="row g-2 align-items-center">
          <div class="col-md-5">
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
              <input type="text" id="searchInput" class="form-control" placeholder="Search by name, designation or college...">
            </div>
          </div>
          <div class="col-md-7">
            <div id="empSummary" class="text-muted small text-md-end"></div>
          </div>
        </div>
      </div>

      <div class="uhs-card p-3">
        <div class="table-responsive">
          <table class="table table-uhs align-middle mb-0">
            <thead>
              <tr id="empHead">
                <th class="uhs-sortable" data-col="name">Name</th>
                <th>Designation</th>
                <th>College / Station</th>
                <th class="uhs-sortable" data-col="date_of_birth">Date of Birth</th>
                <th class="uhs-sortable" data-col="retirement">Retirement Date</th>
                <th>Status</th>
                <th class="text-end admin-only">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="uhs-footer-mount"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="empModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="empForm">
        <div class="modal-header">
          <h6 class="modal-title fw-bold" id="empModalTitle">Add Employee</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name *</label>
            <input type="text" class="form-control" id="empName" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Designation</label>
            <input type="text" class="form-control" id="empDesignation" list="designationList" placeholder="e.g. Associate Professor">
            <datalist id="designationList"></datalist>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Date of Birth</label>
              <input type="date" class="form-control" id="empDob">
              <div class="form-text" id="retirementHint"></div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">College / Station</label>
              <select class="form-select" id="empCollege"><option value="">Select college</option></select>
            </div>
          </div>
          <div class="row g-3 mt-0">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control" id="empEmail">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <input type="text" class="form-control" id="empPhone">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-uhs-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config/supabase.js"></script>
<script src="../config/config.js"></script>
<script src="../components/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../components/onboarding.js"></script>
<script>
let editId = null;
let collegesCache = [];
let employees = [];
let sortBy = "retirement";
let sortDir = "asc";

function retirementOf(e) {
  const rd = Utils.retirementDate(e.date_of_birth);
  return rd ? rd.getTime() : Infinity;   // undated employees sort last
}

function statusBadge(e) {
  const rd = Utils.retirementDate(e.date_of_birth);
  if (!rd) return "—";
  const m = Utils.monthsUntil(rd);
  if (m < 0) return `<span class="badge-status badge-terminated">Retired</span>`;
  if (m <= 12) return `<span class="badge-status badge-completed">Retiring in ${m} mo</span>`;
  return `<span class="badge-status badge-ongoing">In service</span>`;
}

function openAddModal() {
  editId = null;
  document.getElementById("empModalTitle").textContent = "Add Employee";
  document.getElementById("empForm").reset();
  document.getElementById("retirementHint").textContent = "";
  new bootstrap.Modal(document.getElementById("empModal")).show();
}

function openEditModal(id) {
  const e = employees.find(x => x.id === id);
  if (!e) return;
  editId = id;
  document.getElementById("empModalTitle").textContent = "Edit Employee";
  document.getElementById("empName").value = e.name || "";
  document.getElementById("empDesignation").value = e.designation || "";
  document.getElementById("empDob").value = e.date_of_birth || "";
  document.getElementById("empCollege").value = e.college_id || "";
  document.getElementById("empEmail").value = e.email || "";
  document.getElementById("empPhone").value = e.phone || "";
  updateRetirementHint();
  new bootstrap.Modal(document.getElementById("empModal")).show();
}

// One-click delete: remove the row immediately, real delete deferred with Undo.
function deleteWithUndo(id) {
  document.querySelector(`#tableBody tr[data-id="${id}"]`)?.remove();
  Utils.undoToast({
    message: "Employee deleted.",
    onUndo: () => loadEmployees(),
    onCommit: async () => {
      try { await DataService.deleteEmployee(id); loadEmployees(); }
      catch (err) { Utils.toast("Delete failed: " + err.message, "error"); loadEmployees(); }
    }
  });
}

function updateRetirementHint() {
  const dob = document.getElementById("empDob").value;
  const rd = Utils.retirementDate(dob);
  document.getElementById("retirementHint").textContent =
    rd ? `Retirement date: ${Utils.formatDate(rd)}` : "";
}

function updateSortIndicators() {
  document.querySelectorAll("#empHead .uhs-sortable").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.col === sortBy) th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
  });
}

function render() {
  const tbody = document.getElementById("tableBody");
  updateSortIndicators();
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  let rows = employees.filter(e =>
    !q || `${e.name} ${e.designation || ""} ${e.college_name || ""}`.toLowerCase().includes(q));

  const dir = sortDir === "asc" ? 1 : -1;
  rows.sort((a, b) => {
    if (sortBy === "retirement") return (retirementOf(a) - retirementOf(b)) * dir;
    if (sortBy === "date_of_birth") {
      const av = a.date_of_birth ? new Date(a.date_of_birth).getTime() : Infinity;
      const bv = b.date_of_birth ? new Date(b.date_of_birth).getTime() : Infinity;
      return (av - bv) * dir;
    }
    return String(a[sortBy] || "").localeCompare(String(b[sortBy] || "")) * dir;
  });

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="uhs-empty-state"><i class="bi bi-person-badge"></i>No employees ${q ? "match your search" : "added yet"}.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(e => {
    const rd = Utils.retirementDate(e.date_of_birth);
    return `
      <tr data-id="${e.id}">
        <td class="fw-semibold">${Utils.escapeHtml(e.name)}</td>
        <td>${Utils.escapeHtml(e.designation || "—")}</td>
        <td>${Utils.escapeHtml(e.college_name || "—")}</td>
        <td>${Utils.formatDate(e.date_of_birth)}</td>
        <td>${rd ? Utils.formatDate(rd) : "—"}</td>
        <td>${statusBadge(e)}</td>
        <td class="text-end admin-only">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEditModal('${e.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteWithUndo('${e.id}')" title="Delete"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
  }).join("");
}

function renderSummary() {
  const total = employees.length;
  const soon = employees.filter(e => {
    const rd = Utils.retirementDate(e.date_of_birth);
    if (!rd) return false;
    const m = Utils.monthsUntil(rd);
    return m >= 0 && m <= 12;
  }).length;
  const dobMissing = employees.filter(e => !e.date_of_birth).length;
  document.getElementById("empSummary").innerHTML =
    `<strong>${total}</strong> employee(s) · <span class="text-warning">${soon}</span> retiring within 12 months` +
    (dobMissing ? ` · <span class="text-muted">${dobMissing} without a date of birth</span>` : "");
}

async function loadColleges() {
  collegesCache = await DataService.listColleges();
  const sel = document.getElementById("empCollege");
  sel.innerHTML = `<option value="">Select college</option>` +
    collegesCache.map(c => `<option value="${c.id}">${Utils.escapeHtml(c.name)}</option>`).join("");
}

async function loadEmployees() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = Utils.skeletonRows(7);
  try {
    employees = await DataService.listEmployees();
    render();
    renderSummary();
  } catch (err) {
    const msg = (err.message || "").toLowerCase();
    if (msg.includes("employees_view") || msg.includes("does not exist") || msg.includes("relation") || msg.includes("schema cache")) {
      tbody.innerHTML = `<tr><td colspan="7" class="py-4">
        <div class="uhs-empty-state">
          <i class="bi bi-database-gear"></i>
          The Employees table isn't set up yet. Run <code>database/migration-v4-employees.sql</code> in the Supabase SQL Editor, then refresh this page.
        </div></td></tr>`;
    } else {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">${Utils.escapeHtml(err.message)}</td></tr>`;
    }
  }
}

document.getElementById("empForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    name: document.getElementById("empName").value.trim(),
    designation: document.getElementById("empDesignation").value.trim() || null,
    date_of_birth: document.getElementById("empDob").value || null,
    college_id: document.getElementById("empCollege").value || null,
    email: document.getElementById("empEmail").value.trim() || null,
    phone: document.getElementById("empPhone").value.trim() || null
  };
  try {
    if (editId) {
      await DataService.updateEmployee(editId, payload);
      Utils.toast("Employee updated.");
    } else {
      await DataService.addEmployee(payload);
      Utils.toast("Employee added.");
    }
    bootstrap.Modal.getInstance(document.getElementById("empModal")).hide();
    loadEmployees();
  } catch (err) {
    Utils.toast("Error: " + err.message, "error");
  }
});


(async () => {
  const session = await Auth.requireAuth();
  if (!session) return;
  renderSidebar("employees");
  renderTopbar("Employees");
  renderFooter();

  document.getElementById("retAge").textContent = APP_CONFIG.retirementAge;
  APP_CONFIG.designationOptions.forEach(d =>
    document.getElementById("designationList").insertAdjacentHTML("beforeend", `<option value="${d}">`));
  document.getElementById("empDob").addEventListener("change", updateRetirementHint);
  document.getElementById("searchInput").addEventListener("input", Utils.debounce(render, 250));
  document.getElementById("empHead").addEventListener("click", (e) => {
    const th = e.target.closest(".uhs-sortable");
    if (!th) return;
    const col = th.dataset.col;
    if (sortBy === col) sortDir = sortDir === "asc" ? "desc" : "asc";
    else { sortBy = col; sortDir = "asc"; }
    render();
  });

  await loadColleges();
  await loadEmployees();
})();
</script>
</body>
</html>
